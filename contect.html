<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact </title>
  

	  <style>
        body {background-color:#f0fdf4;
		 font-family: Arial;
		 padding: 20px;
 		max-width: 500px; 
		margin: auto; }


        input, textarea, button { 
            width: 100%; 
            padding: 10px; 
            margin: 8px 0; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
        }
        button { 
            background: #1877f2; 
            color: white; 
            border: none; 
            cursor: pointer; 
        }
        button:hover { background: #166fe5; }
    </style>
</head>
<body>

    <h2>Contact Us</h2>
    <form action="#" method="POST">
        
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="enter full name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="email@example.com" required>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" placeholder="03XX-XXXXXXX">

        <label for="city">City:</label>
        <input type="text" id="city" name="city" placeholder="Karachi, Lahore...">

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="4" placeholder="type your message"></textarea>

        <button type="submit">Submit</button>
    </form>

</body>
</html>
